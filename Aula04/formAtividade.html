<!doctype html>
<html lang="pr-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário Mordeno</title>
    <link rel="stylesheet" type="text/css" href="lindeza.css" />
  </head>
  <body>
    <div class="conteine">
        <div class="esquerda-card">
      <!-- Container para o conteúdo da esquerda -->
      <h2>Bem Vindo! &#128515;</h2>
      <p>
        Preencha o formulário ao lado para realizar seu cadastro. Nosso sistema
        é rápido, seguro e fácil de usar.
      </p>
    </div>
    <div class="direita-card">
      <!-- Container para o conteúdo da direita -->
      <form action="" method="post">
        <div class="linha">
          <div class="grupo" style="flex: 1">
            <label>Nome</label>
            <input type="text" placeholder="Seu nome" />
          </div>
          <div class="grupo" style="flex: 1">
            <label>Sobrenome</label>
            <input type="text" placeholder="Seu sobrenome" />
          </div>
        </div>
        <div class="grupo">
          <label>Email</label>
          <input type="email" placeholder="Digite seu email" />
        </div>
        <div class="linha">
          <div class="grupo" style="flex: 1">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha" />
          </div>
          <div class="grupo" style="flex: 1">
            <label>Perfil</label>
            <select>
              <option>Selecione</option>
              <option value="aluno">Aluno</option>
              <option value="professor">Professor</option>
              <option value="administrador">Administrador</option>
            </select>
          </div>
        </div>
        <button type="submit">Cadastrar</button>
      </form>
    </div>
    </div>
    
  </body>
</html>
