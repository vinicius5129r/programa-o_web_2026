<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 6</title>
  </head>
  <body>
    <script>
      maior = null;
      menor = null;
      num;

      while (true) {
        num = parseInt(prompt("Digite um número inteiro (0 para sair): "));
        if (num === 0) {
          break;
        }
        if (maior === null || num > maior) {
          maior = num;
        }
        if (menor === null || num < menor) {
          menor = num;
        }
      }

      if (maior !== null && menor !== null) {
        alert(
          `O maior número digitado é: ${maior}\nO menor número digitado é: ${menor}`,
        );
      } else {
        alert("Nenhum número foi digitado.");
      }
    </script>
  </body>
</html>
