<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 8</title>
  </head>
  <body>
    <script>
      soma = 0;
      quantidade = 0;
      maior = null;
      menor = null;
      somaPares = 0;
      quantidadePares = 0;

      while (true) {
        num = parseInt(prompt("Digite um número inteiro (0 para sair): "));
        if (num === 0) {
          break;
        }
        soma += num;
        quantidade++;

        if (maior === null || num > maior) {
          maior = num;
        }
        if (menor === null || num < menor) {
          menor = num;
        }
        if (num % 2 === 0) {
          somaPares += num;
          quantidadePares++;
        }
      }

      if (quantidade > 0) {
        const media = soma / quantidade;
        const mediaPares =
          quantidadePares > 0 ? somaPares / quantidadePares : "N/A";
        alert(
          `Soma: ${soma}\nQuantidade: ${quantidade}\nMédia: ${media}\nMaior: ${maior}\nMenor: ${menor}\nMédia dos pares: ${mediaPares}`,
        );
      } else {
        alert("Nenhum número foi digitado.");
      }
    </script>
  </body>
</html>
