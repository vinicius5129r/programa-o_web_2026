<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 4</title>
  </head>
  <body>
    <script>
      soma = 0;
      num;
      do {
        num = parseInt(prompt("Digite um número (0 para sair):"));
        soma += num;
      } while (num !== 0);
      alert(`A soma de todos os números lidos é: ${soma}`);
    </script>
  </body>
</html>
