<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 3</title>
  </head>
  <body>
    <script>
      let soma = 0;
      for (let i = 1; i <= 10; i++) {
        let num = parseInt(prompt(`Digite o ${i}º número:`));
        soma += num;
      }
      alert(`A soma de todos os números lidos é: ${soma}`);
    </script>
  </body>
</html>
