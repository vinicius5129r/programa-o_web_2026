<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <script>
        let soma = 0;
        let num;
        while (true) {
            num = parseInt(prompt("Digite um número (0 para sair):"));
            if (num === 0) {
                break;
            }
            soma += num;
        }
        alert(`A soma de todos os números lidos é: ${soma}`);
    </script>
</body>
</html>
