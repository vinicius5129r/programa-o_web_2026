  <body>
    <script>
      let numeros = [1, 2, 3, 4, 5];
      console.log(numeros); // Imprime o vetor original
      for (let i = 0; i < numeros.length; i++) {
        console.log(numeros[i] * 2); // Imprime cada elemento do vetor multiplicado por 2
      }
    </script>
