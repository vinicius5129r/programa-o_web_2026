<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laço de Repetição</title>
  </head>
  <body>
    <!-- Mostre a tabuada de um número -->
    <script>
      numero = parseInt(prompt("Digite um número para ver a tabuada: "));
      alert("Tabuada do " + numero);
      for (i = 1; i <= 10; i++) {
        alert(numero + " x " + i + " = " + numero * i);
      }
    </script>
  </body>
</html>
