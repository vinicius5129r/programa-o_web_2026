<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questão 5</title>
  </head>
  <body>
    <!-- Escreva um algoritmo que leia 10 números e conte quantos deles estão nos seguintes intervalos: [0-25], [26-50], [51-75] e [76-100] -->

    <script>
      let cont25 = 0;
      let cont50 = 0;
      let cont75 = 0;
      let cont100 = 0;

      for (let i = 1; i <= 10; i++) {
        let num = parseInt(prompt(`Digite o ${i}º número:`));

        if (isNaN(num)) {
          alert("Por favor, digite um número válido!");
          i--;
          continue;
        }

        if (num >= 0 && num <= 25) {
          cont25++;
        } else if (num >= 26 && num <= 50) {
          cont50++;
        } else if (num >= 51 && num <= 75) {
          cont75++;
        } else if (num >= 76 && num <= 100) {
          cont100++;
        }
      }

      alert(
        `Números no intervalo [0-25]: ${cont25}\nNúmeros no intervalo [26-50]: ${cont50}\nNúmeros no intervalo [51-75]: ${cont75}\nNúmeros no intervalo [76-100]: ${cont100}`,
      );
    </script>
  </body>
</html>
