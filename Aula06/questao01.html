<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questão 1</title>
  </head>
  <body>
    <!-- Entre com 10 números e diga o maior -->
    <script>
      let maior = 0;
      alert("Digite 10 números para descobrir qual é o maior");
      for (i = 1; i <= 10; i++) {
        let numero = parseInt(prompt("Digite o " + i + "º número:"));
        if (numero > maior) {
          maior = numero;
        }
      }
      alert("O maior número é: " + maior);
    </script>
  </body>
</html>
