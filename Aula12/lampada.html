<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lâmpada</title>
  </head>
  <body>
    <button
      onclick="
        document.getElementById('minhaImagem').src = 'img/pic_bulbon.gif'
      "
    >
      Ligado
    </button>
    <img id="minhaImagem" src="img/pic_bulboff.gif" style="width: 100px" />
    <button
      onclick="
        document.getElementById('minhaImagem').src = 'img/pic_bulboff.gif'
      "
    >
      Desligado
    </button>
    <br />
    <p id="paragrafo">O javascript altera o css</p>
    <!-- o javascript altera o css -->
    <button
      onclick="document.getElementById('paragrafo').style.fontSize = '40px'"
    >
      Clique aqui 1
    </button>
    <!-- ocultar elemento -->
    <button
      onclick="document.getElementById('paragrafo').style.display = 'none'"
    >
      Clique aqui 2
    </button>
    <!-- mostrar elemento -->
    <button
      onclick="document.getElementById('paragrafo').style.display = 'block'"
    >
      Clique aqui 3
    </button>
  </body>
</html>
