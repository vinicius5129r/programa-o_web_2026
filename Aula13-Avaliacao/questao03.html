<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaliação</title>
  </head>
  <body>
    <!-- um array e um metodo filter()-->
     <script>
      let numeros = [3, 8, 12, 5, 7, 20, 25, 30, 35, 26, 21, 22, 9, 10];
      let numerosPares = numeros.filter(function (numero) {
        return numero % 2 === 0 && numero > 18;
      });
      alert("Números pares maiores que 18: " + numerosPares);
    </script>
  </body>
</html>
