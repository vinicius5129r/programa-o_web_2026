<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaliação</title>
  </head>
  <body>
    <h2>Cálculo de reajuste salarial</h2>
    <form>
      <label>Salário atual (R$):</label>
      <input type="number" id="salarioAtual" step="0.01" />
      <button type="button" onclick="calcularReajuste()">
        Calcular Reajuste
      </button>
    </form>
    <h3>Resultado</h3>
    <p id="resultado"></p>
    <script>
      function calcularReajuste() {
        let salarioAtual = parseFloat(
          document.getElementById("salarioAtual").value,
        );
        let percentualReajuste;

        if (salarioAtual <= 1000) {
          percentualReajuste = 0.2; // 20%
        } else if (salarioAtual > 1000 && salarioAtual <= 2000) {
          percentualReajuste = 0.15; // 15%
        } else if (salarioAtual > 2000 && salarioAtual <= 3000) {
          percentualReajuste = 0.1; // 10%
        } else {
          percentualReajuste = 0.05; // 5%
        }

        let valorReajuste = salarioAtual * percentualReajuste;
        let novoSalario = salarioAtual + valorReajuste;

        document.getElementById("resultado").innerText =
          "Valor do reajuste: R$ " +
          valorReajuste.toFixed(2) +
          "\nNovo salário: R$ " +
          novoSalario.toFixed(2);
      }
    </script>
  </body>
</html>
