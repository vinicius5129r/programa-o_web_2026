<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaliação</title>
  </head>
  <body>
    <script>
      let salarioAtual = parseFloat(prompt("Informe o salário atual: "));
      if (salarioAtual == 280) {
        let aumento = salarioAtual * 0.2;
        let novoSalario = salarioAtual + aumento;
        salarioAumentos(salarioAtual, aumento, novoSalario);
      } else if (salarioAtual > 280 && salarioAtual <= 700) {
        let aumento = salarioAtual * 0.15;
        let novoSalario = salarioAtual + aumento;
        salarioAumentos(salarioAtual, aumento, novoSalario);
      } else if (salarioAtual > 700 && salarioAtual <= 1500) {
        let aumento = salarioAtual * 0.1;
        let novoSalario = salarioAtual + aumento;
        salarioAumentos(salarioAtual, aumento, novoSalario);
      } else if (salarioAtual > 1500) {
        let aumento = salarioAtual * 0.05;
        let novoSalario = salarioAtual + aumento;
        salarioAumentos(salarioAtual, aumento, novoSalario);
      } else {
        alert("Salário inválido! Por favor, digite um valor positivo.");
      }

      function salarioAumentos(salarioAtual, aumento, novoSalario) {
        document.write(
          "O salário atual antes do reajuste: R$ " +
            salarioAtual.toFixed(2) +
            "<br>Percentual de aumento aplicado: 20%<br>Valor do aumento: R$ " +
            aumento.toFixed(2) +
            "<br>Novo salário, após o aumento: R$ " +
            novoSalario.toFixed(2) +
            ".",
        );
      }
    </script>
  </body>
</html>
