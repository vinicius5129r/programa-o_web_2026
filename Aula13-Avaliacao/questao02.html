<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaliação</title>
  </head>
  <body>
    <script>
      let numero = parseInt(
        prompt("Digite um número de (1 a 7) para mostrar o dia da semana: "),
      );
      switch (numero) {
        case 1:
          alert("Domingo");
          break;
        case 2:
          alert("Segunda-feira");
          break;
        case 3:
          alert("Terça-feira");
          break;
        case 4:
          alert("Quarta-feira");
          break;
        case 5:
          alert("Quinta-feira");
          break;
        case 6:
          alert("Sexta-feira");
          break;
        case 7:
          alert("Sábado");
          break;
        default:
          alert("Número inválido! Por favor, digite um número entre 1 e 7.");
      }
    </script>
  </body>
</html>
