<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Função 01</title>
  </head>
  <body>
    <!-- Função para exibir uma saudação e realizar uma soma de dois números -->
    <script>
      function saudacao() {
        console.log("Olá, seja bem-vindo!");
      } // Chamando a função para exibir a saudação
      saudacao();

      function soma(a, b) {
        return a + b;
      } // Chamando a função para realizar a soma
      let resultado = soma(5, 3);
      console.log("O resultado da soma é: " + resultado);
    </script>
  </body>
</html>
